# Sostituito con l'URL reale del tuo sito
baseURL: "https://tux-pi.github.io/"
title: "TuxPi"
languageCode: "it-it"

# Importa Hextra come modulo
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true # Necessario per far funzionare lo slider HTML nella home
  highlight:
    noClasses: false

# Configurazione del Menu Superiore
menu:
  main:
    - name: "Home"
      url: "/"
      weight: 1
    - name: "Articoli"
      url: "/blog"
      weight: 2
    - name: "Sezioni"
      url: "/docs"
      weight: 3
    - name: "Chi Sono"
      url: "/chi-sono"
      weight: 4
    - name: "Cerca"
      weight: 10
      params:
        type: search

params:
  # --- IMPOSTAZIONI DI LAYOUT GLOBALI ---
  # Queste impostazioni rimuovono lo spazio bianco e allargano tutto il sito
  navbar:
    displayTitle: true
    displayLogo: false
    title: "TUXPI"
    width: "max-w-[100%]" # Allarga la barra di navigazione al 100%

  footer:
    displayCopyright: true
    displayPoweredBy: false
    text: "© 2026 Progetto TuxPi"
    width: "max-w-[1400px]"

  # Impostazioni tema
  theme:
    default: "dark"

  # Configurazione Sidebar e TOC (Table of Contents)
  # Disabilitiamo globalmente la colonna destra "In this page" per la home
  toc:
    enable: false 
  
  sidebar:
    defaultMenuCollapsed: true
    # Questo aiuta a nascondere la sidebar dove non serve
    display: false 

  # Link di modifica disabilitato
  editURL:
    enable: false
